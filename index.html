<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    /* ---------- Brand mark ---------- */
    function ConvergenceMark({ size = 10, gap = 6, dim = false, color: colorProp }) {
      const color = colorProp || (dim ? '#8a6e3e' : '#c8a96e');
      const s = size;
      const triangleW = s * 2 + gap * 2;
      const triangleH = s * 2 + gap;
      return (
        <span className="inline-block relative" style={{ width: triangleW, height: triangleH }}>
          <span className="gather-dot gather-dot-1" style={{ position:'absolute', left: 0, bottom: 0, width: s, height: s, borderRadius: '50%', background: color }} />
          <span className="gather-dot gather-dot-2" style={{ position:'absolute', right: 0, bottom: 0, width: s, height: s, borderRadius: '50%', background: color }} />
          <span className="gather-dot gather-dot-3" style={{ position:'absolute', left: '50%', top: 0, transform:'translateX(-50%)', width: s, height: s, borderRadius: '50%', background: color }} />
        </span>
      );
    }

    function ConvergenceDivider({ background = '#f5f2ec' }) {
      return (
        <div
          aria-hidden
          className="w-full flex flex-col items-center"
          style={{ background, paddingTop: 80, paddingBottom: 80, gap: 16 }}
        >
          <ConvergenceMark size={20} gap={10} color="#8a6e3e" />
          <ConvergenceMark size={14} gap={7}  color="#c8a96e" />
          <ConvergenceMark size={10} gap={5}  color="#d8d2c8" />
        </div>
      );
    }

    /* ---------- Living manifest band (communities + venues marquee) ---------- */
    // Small inline convergence mark used as a separator between items.
    function MarqueeSep() {
      return (
        <span className="gather-manifest-sep" aria-hidden="true">
          <svg width="11" height="10" viewBox="0 0 11 10">
            <circle cx="1.5" cy="8.5" r="1.5" fill="#c8a96e" />
            <circle cx="9.5" cy="8.5" r="1.5" fill="#c8a96e" />
            <circle cx="5.5" cy="1.5" r="1.5" fill="#c8a96e" />
          </svg>
        </span>
      );
    }

    function MarqueeRow({ items, rowIndex }) {
      // Render the items twice back-to-back so the translateX(-50%) loop
      // is seamless. Each item is followed by a separator.
      const renderRun = (runKey) => (
        <React.Fragment key={runKey}>
          {items.map((label, i) => (
            <React.Fragment key={`${runKey}-${i}`}>
              <span className="gather-manifest-item">{label}</span>
              <MarqueeSep />
            </React.Fragment>
          ))}
        </React.Fragment>
      );

      return (
        <div className={`gather-manifest-row gather-manifest-row-${rowIndex}`}>
          <div className="gather-manifest-track">
            {renderRun('a')}
            {renderRun('b')}
          </div>
        </div>
      );
    }

    function LivingManifest() {
      const communities = [
        'Calgary AI Practitioners',
        'Music Production Club',
        'AI Tools Club',
        'DJ Practice Nights',
        'Sunday Dinner Club',
        'Paint Night Club',
        'Entrepreneurs Circle',
        'Saturday Morning Run Club',
        'Prompt Engineering Nights',
        'Ableton Circle',
        'Bridgeland Founders',
        'Book Club',
        'Mindful Yoga',
        'Board Game Night',
        'Vibe Coding Saturdays',
        'Piano Lessons',
        'French Conversation',
        'Pottery Studio',
        'Beatmakers Meetup',
        'Fiction Writers Group',
        'Chess Club',
        'Watercolor Sundays',
        'Cocktail Workshop',
        'Photography Walks',
        'Meditation Mornings',
        'Jazz Nights',
      ];
      const venues = [
        'Gargoyle House',
        'Inglewood Event Loft',
        'Kensington Studio',
        'Mission Rooftop',
        'Bridgeland Kitchen',
        'Cliff Bungalow Garden',
        'Eau Claire Loft',
        'Hillhurst Bookshop',
        'Riverside Terrace',
        'Ramsay Warehouse',
        'Beltline Atelier',
        'Mount Royal Parlour',
        'Sunnyside Cafe',
        'West Hillhurst Loft',
      ];
      return (
        <section
          className="gather-manifest w-full"
          data-screen-label="02 Living manifest"
          aria-label="Sample of communities and venues on Gather"
        >
          <MarqueeRow items={communities} rowIndex={1} />
          <MarqueeRow items={venues} rowIndex={2} />
        </section>
      );
    }

    function Wordmark({ size = 'base' }) {
      const sizes = {
        base: { font: '28px', gap: '14px', dot: 7, gapDot: 4 },
        lg:   { font: '40px', gap: '18px', dot: 9, gapDot: 5 },
        sm:   { font: '22px', gap: '12px', dot: 6, gapDot: 3 },
      }[size];
      return (
        <span className="inline-flex items-center" style={{ gap: sizes.gap }}>
          <ConvergenceMark size={sizes.dot} gap={sizes.gapDot} />
          <span className="font-serif" style={{ fontSize: sizes.font, fontWeight: 400, letterSpacing: '-0.01em' }}>Gather</span>
        </span>
      );
    }

    /* ---------- Three-dot bullet ---------- */
    function DotBullet() {
      return (
        <span className="inline-flex items-center flex-none mt-[10px]" style={{ gap: 3 }} aria-hidden>
          <span style={{ width: 5, height: 5, borderRadius: '50%', background: '#c8a96e' }} />
          <span style={{ width: 5, height: 5, borderRadius: '50%', background: '#c8a96e' }} />
          <span style={{ width: 5, height: 5, borderRadius: '50%', background: '#c8a96e' }} />
        </span>
      );
    }

    /* horizontal three-dot divider */
    function DotDivider({ className = '' }) {
      return (
        <span className={`inline-flex items-center ${className}`} style={{ gap: 6 }} aria-hidden>
          <span style={{ width: 4, height: 4, borderRadius: '50%', background: '#c8a96e' }} />
          <span style={{ width: 4, height: 4, borderRadius: '50%', background: '#c8a96e' }} />
          <span style={{ width: 4, height: 4, borderRadius: '50%', background: '#c8a96e' }} />
        </span>
      );
    }

    /* ---------- Reveal on scroll ---------- */
    function Reveal({ children, as: Tag = 'div', className = '', delay = 0, ...rest }) {
      return <Tag className={className} {...rest}>{children}</Tag>;
    }

    /* ---------- Photograph ---------- */
    function PhotoPlaceholder({ label = 'photograph — placeholder', aspect = '4/5', className = '', src, caption, objectPosition = 'center' }) {
      if (src) {
        return (
          <figure className={`w-full ${className}`} style={{ margin: 0 }}>
            <div
              className="w-full overflow-hidden"
              style={{ aspectRatio: aspect, borderRadius: 2, background: '#e4ddcf' }}
            >
              <img
                src={src}
                alt={caption || label}
                loading="lazy"
                className="w-full h-full block"
                style={{ objectFit: 'cover', objectPosition, filter: 'saturate(0.92) contrast(0.98)' }}
              />
            </div>
            {caption && (
              <figcaption
                className="italic mt-3"
                style={{ color: '#7a7670', fontSize: 12, letterSpacing: '0.02em' }}
              >
                {caption}
              </figcaption>
            )}
          </figure>
        );
      }
      return (
        <div
          className={`photo-placeholder w-full flex items-end justify-start ${className}`}
          style={{ aspectRatio: aspect, borderRadius: 2 }}
        >
          <span className="italic text-[13px] m-4" style={{ color: '#7a7670', fontFamily: '"DM Sans", sans-serif' }}>
            {label}
          </span>
        </div>
      );
    }

    /* ---------- Section scaffolding ---------- */
    function Section({ id, children, className = '', label, style }) {
      return (
        <section id={id} data-screen-label={label} className={`w-full ${className}`} style={style}>
          {children}
        </section>
      );
    }

    /* ---------- Built-for section block ---------- */
    function BuiltFor({ eyebrow, title, paragraph, bullets, reverse = false, photoLabel, photoSrc, photoCaption, photoAspect, photoObjectPosition, learnMoreHref, learnMoreLabel }) {
      return (
        <div className="max-w-[1180px] mx-auto px-6 md:px-10">
          <div className={`grid grid-cols-1 md:grid-cols-12 gap-10 md:gap-16 items-start`}>
            <Reveal className={`md:col-span-6 ${reverse ? 'md:order-2' : ''}`}>
              <PhotoPlaceholder label={photoLabel} src={photoSrc} caption={photoCaption} aspect={photoAspect || (reverse ? '5/6' : '4/5')} objectPosition={photoObjectPosition} />
            </Reveal>
            <Reveal className={`md:col-span-6 ${reverse ? 'md:order-1' : ''}`} delay={120}>
              <div className="eyebrow text-amber">{eyebrow}</div>
              <h3 className="display mt-6 text-midnight" style={{ fontSize: 'clamp(40px, 5vw, 64px)' }}>
                {title}
              </h3>
              <p className="mt-8 text-midnight/80 max-w-[46ch]" style={{ fontSize: 17, lineHeight: 1.7 }}>
                {paragraph}
              </p>
              <ul className="mt-10 space-y-5 max-w-[52ch]">
                {bullets.map((b, i) => (
                  <li key={i} className="flex gap-4 items-start">
                    <DotBullet />
                    <span className="text-midnight/85" style={{ fontSize: 16, lineHeight: 1.6 }}>{b}</span>
                  </li>
                ))}
              </ul>
              {learnMoreHref && (
                <a href={learnMoreHref} className="qlink mt-10 inline-flex" style={{ color: '#8a6e3e', fontSize: 15, letterSpacing: '0.02em', fontWeight: 500 }}>
                  {learnMoreLabel || 'Learn more'} <span className="arrow">→</span>
                </a>
              )}
            </Reveal>
          </div>
        </div>
      );
    }

    /* ---------- Tabbed "Built for…" ---------- */
    function BuiltForTabs({ tabs }) {
      const [active, setActive] = useState(0);
      const [visible, setVisible] = useState(0); // what's currently rendered
      const [phase, setPhase] = useState('in');  // 'in' | 'out'

      useEffect(() => {
        if (active === visible) return;
        setPhase('out');
        const t = setTimeout(() => {
          setVisible(active);
          setPhase('in');
        }, 250);
        return () => clearTimeout(t);
      }, [active, visible]);

      const current = tabs[visible];

      return (
        <div className="max-w-[1180px] mx-auto px-6 md:px-10">
          {/* Tab row */}
          <div className="flex items-center justify-center gap-8 md:gap-14 flex-wrap" style={{ borderBottom: '1px solid #d8d2c8', paddingBottom: 0 }}>
            {tabs.map((t, i) => {
              const isActive = i === active;
              return (
                <button
                  key={t.key}
                  onClick={() => setActive(i)}
                  className="gather-builtfor-tab"
                  data-active={isActive ? 'true' : 'false'}
                  style={{
                    background: 'transparent',
                    border: 0,
                    padding: '16px 2px 14px',
                    fontFamily: '"DM Sans", sans-serif',
                    fontSize: 14,
                    letterSpacing: '0.14em',
                    textTransform: 'uppercase',
                    fontWeight: 500,
                    color: isActive ? '#8a6e3e' : '#7a7670',
                    cursor: 'pointer',
                    position: 'relative',
                    transition: 'color 250ms ease',
                  }}
                >
                  {t.label}
                  <span
                    aria-hidden
                    style={{
                      position: 'absolute',
                      left: 0, right: 0, bottom: -1,
                      height: 2,
                      background: '#8a6e3e',
                      transform: isActive ? 'scaleX(1)' : 'scaleX(0)',
                      transformOrigin: 'center',
                      transition: 'transform 300ms ease',
                    }}
                  />
                </button>
              );
            })}
          </div>
          <style>{`.gather-builtfor-tab[data-active="false"]:hover { color: #0f0e0c !important; }`}</style>

          {/* Crossfading content */}
          <div className="mt-14 md:mt-16" style={{
            opacity: phase === 'in' ? 1 : 0,
            transform: phase === 'in' ? 'translateY(0)' : 'translateY(6px)',
            transition: 'opacity 250ms ease, transform 250ms ease',
          }}>
            <div className="grid grid-cols-1 md:grid-cols-12 gap-10 md:gap-16 items-start">
              <div className={`md:col-span-6 ${current.reverse ? 'md:order-2' : ''}`}>
                <PhotoPlaceholder
                  label={current.photoLabel}
                  src={current.photoSrc}
                  aspect={current.photoAspect || (current.reverse ? '5/6' : '4/5')}
                  objectPosition={current.photoObjectPosition}
                />
              </div>
              <div className={`md:col-span-6 ${current.reverse ? 'md:order-1' : ''}`}>
                <div className="eyebrow text-amber">{current.eyebrow}</div>
                <h3 className="display mt-6 text-midnight" style={{ fontSize: 'clamp(40px, 5vw, 64px)' }}>
                  {current.title}
                </h3>
                <p className="mt-8 text-midnight/80 max-w-[46ch]" style={{ fontSize: 17, lineHeight: 1.7 }}>
                  {current.paragraph}
                </p>
                <ul className="mt-10 space-y-5 max-w-[52ch]">
                  {current.bullets.map((b, i) => (
                    <li key={i} className="flex gap-4 items-start">
                      <DotBullet />
                      <span className="text-midnight/85" style={{ fontSize: 16, lineHeight: 1.6 }}>{b}</span>
                    </li>
                  ))}
                </ul>
                {current.learnMoreHref && (
                  <a href={current.learnMoreHref} className="qlink mt-10 inline-flex" style={{ color: '#8a6e3e', fontSize: 15, letterSpacing: '0.02em', fontWeight: 500 }}>
                    {current.learnMoreLabel || 'Learn more'} <span className="arrow">→</span>
                  </a>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ---------- Diagram: four-sided marketplace (animated) ---------- */
    function FourSidedDiagram() {
      const svgRef = useRef(null);
      const [inView, setInView] = useState(false);

      useEffect(() => {
        const el = svgRef.current;
        if (!el) return;
        if (typeof IntersectionObserver === 'undefined') { setInView(true); return; }
        const io = new IntersectionObserver((entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              setInView(true);
              io.disconnect(); // one-shot
            }
          });
        }, { threshold: 0.3 });
        io.observe(el);
        return () => io.disconnect();
      }, []);

      const nodes = [
        { cx: 140, cy: 90,  label: 'Venues',              labelY: 72,  key: 'venues'   },
        { cx: 580, cy: 90,  label: 'Community Founders',  labelY: 72,  key: 'founders' },
        { cx: 140, cy: 330, label: 'Teachers',            labelY: 358, key: 'teachers' },
        { cx: 580, cy: 330, label: 'Members',             labelY: 358, key: 'members'  },
      ];

      // Three particle sizes per corner.
      const particleSizes = [2.5, 2, 1.5];

      return (
        <svg
          ref={svgRef}
          viewBox="0 0 720 420"
          className={`gather-fsd w-full h-auto${inView ? ' in-view' : ''}`}
          aria-label="Four-sided marketplace diagram"
        >
          {/* connecting lines — cognac 30%, 0.8px */}
          <g>
            <line className="fsd-line" x1="140" y1="90"  x2="360" y2="210" />
            <line className="fsd-line" x1="580" y1="90"  x2="360" y2="210" />
            <line className="fsd-line" x1="140" y1="330" x2="360" y2="210" />
            <line className="fsd-line" x1="580" y1="330" x2="360" y2="210" />
          </g>

          {/* outer nodes + labels */}
          {nodes.map((n, i) => (
            <g key={n.key}>
              <circle
                className={`fsd-node fsd-node-${i}`}
                cx={n.cx} cy={n.cy} r="5.5"
                fill="#c8a96e"
              />
              <text
                className={`fsd-label fsd-label-${i}`}
                x={n.cx}
                y={n.labelY}
                textAnchor="middle"
                fontFamily="DM Sans, sans-serif"
                fontSize="12"
                fontWeight="400"
                fill="#0f0e0c"
                letterSpacing="0.04em"
              >
                {n.label}
              </text>
            </g>
          ))}

          {/* central static ring — midnight 0.8px */}

    /* ---------- Waitlist + Referral ---------- */
    function Waitlist() {
      const [waitSubmitted, setWaitSubmitted] = useState(false);
      const [refSubmitted, setRefSubmitted] = useState(false);
      const [email, setEmail] = useState('');
      const [role, setRole] = useState('');
      const [ref, setRef] = useState('');
      const [waitLoading, setWaitLoading] = useState(false);
      const [waitError, setWaitError] = useState('');
      const [refLoading, setRefLoading] = useState(false);
      const [refError, setRefError] = useState('');

      const genericError = "Something went wrong. Please try again or email us at hello@gather.place.";

      async function submitWait(e) {
        e.preventDefault();
        if (!email || !email.includes('@')) return;
        if (!role) return;
        setWaitError('');
        setWaitLoading(true);
        try {
          const { error } = await window.gatherSupabase
            .from('waitlist')
            .insert({ email, role });
          if (error) {
            setWaitError(genericError);
          } else {
            setWaitSubmitted(true);
          }
        } catch (err) {
          setWaitError(genericError);
        } finally {
          setWaitLoading(false);
        }
      }

      async function submitRef(e) {
        e.preventDefault();
        if (!ref) return;
        setRefError('');
        setRefLoading(true);
        try {
          const { error } = await window.gatherSupabase
            .from('referrals')
            .insert({ referral: ref });
          if (error) {
            setRefError(genericError);
          } else {
            setRefSubmitted(true);
          }
        } catch (err) {
          setRefError(genericError);
        } finally {
          setRefLoading(false);
        }
      }

      return (
        <div className="max-w-[980px] mx-auto px-6 md:px-10">
          <div className="border hair" style={{ borderRadius: 2, padding: 'clamp(32px, 5vw, 72px)', background: '#f5f2ec' }}>
            {/* Block A */}
            <Reveal>
              <div className="flex items-center gap-3">
                <DotDivider />
                <span className="eyebrow text-cognac">Waitlist</span>
              </div>
              <h2 className="display mt-6 text-midnight" style={{ fontSize: 'clamp(38px, 5vw, 60px)' }}>
                Be <em className="italic" style={{color:'#8a6e3e'}}>first</em> when Gather opens in Calgary.
              </h2>
            </Reveal>

            <Reveal delay={120}>
              {!waitSubmitted ? (
                <form onSubmit={submitWait} className="mt-12 grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-8 items-end">
                  <div className="md:col-span-5">
                    <label className="eyebrow text-stone">Email</label>
                    <input
                      type="email" required
                      className="field mt-3"
                      placeholder="you@domain.com"
                      value={email}
                      onChange={(e) => setEmail(e.target.value)}
                    />
                  </div>
                  <div className="md:col-span-4">
                    <label className="eyebrow text-stone">I'm interested as a…</label>
                    <select
                      required
                      className="field mt-3"
                      value={role}
                      onChange={(e) => setRole(e.target.value)}
                    >
                      <option value="" disabled>Choose one</option>
                      <option value="member">Member</option>
                      <option value="founder">Community Founder</option>
                      <option value="teacher">Teacher or Practitioner</option>
                      <option value="venue">Venue Owner</option>
                    </select>
                  </div>
                  <div className="md:col-span-3 md:justify-self-end w-full">
                    <button
                      type="submit"
                      className="cta cta-amber w-full md:w-auto"
                      disabled={waitLoading}
                      style={waitLoading ? { opacity: 0.6, cursor: 'not-allowed' } : undefined}
                    >
                      {waitLoading ? 'Joining…' : 'Join the waitlist'}
                    </button>
                  </div>
                  {waitError ? (
                    <div className="md:col-span-12"
                         style={{ fontFamily: '"DM Sans", sans-serif', fontSize: 14, color: '#a32d2d', marginTop: 16 }}
                         role="alert" aria-live="polite">
                      {waitError}
                    </div>
                  ) : null}
                </form>
              ) : (
                <div className="mt-12 py-8 flex items-center gap-4">
                  <DotDivider />
                  <p className="font-serif text-midnight" style={{ fontSize: 24 }}>
                    Thanks — we'll be in touch.
                  </p>
                </div>
              )}
            </Reveal>

            {/* divider */}
            <div className="my-14 md:my-20 h-px" style={{ background: '#d8d2c8' }} />

            {/* Block B */}
            <Reveal>
              <div className="flex items-center gap-3">
                <DotDivider />
                <span className="eyebrow text-cognac">Referral</span>
              </div>
              <h3 className="display mt-6 text-midnight" style={{ fontSize: 'clamp(28px, 3.4vw, 40px)' }}>
                Know someone who should be <em className="italic" style={{color:'#8a6e3e'}}>part</em> of this?
              </h3>
              <p className="mt-5 text-midnight/75 max-w-[60ch]" style={{ fontSize: 16, lineHeight: 1.7 }}>
                A venue with dead hours. A friend who should be running a community. A teacher who deserves a bigger calendar. Send them our way.
              </p>
            </Reveal>

            <Reveal delay={120}>
              {!refSubmitted ? (
                <form onSubmit={submitRef} className="mt-10 grid grid-cols-1 md:grid-cols-12 gap-6 md:gap-8 items-end">
                  <div className="md:col-span-8">
                    <label className="eyebrow text-stone">Their email or name</label>
                    <input
                      type="text" required
                      className="field mt-3"
                      placeholder="name or email"
                      value={ref}
                      onChange={(e) => setRef(e.target.value)}
                    />
                  </div>
                  <div className="md:col-span-4 md:justify-self-end w-full">
                    <button
                      type="submit"
                      className="cta cta-cognac w-full md:w-auto"
                      disabled={refLoading}
                      style={refLoading ? { opacity: 0.6, cursor: 'not-allowed' } : undefined}
                    >
                      {refLoading ? 'Sending…' : 'Send a referral'}
                    </button>
                  </div>
                  {refError ? (
                    <div className="md:col-span-12"
                         style={{ fontFamily: '"DM Sans", sans-serif', fontSize: 14, color: '#a32d2d', marginTop: 16 }}
                         role="alert" aria-live="polite">
                      {refError}
                    </div>
                  ) : null}
                </form>
              ) : (
                <div className="mt-10 py-6 flex items-center gap-4">
                  <DotDivider />
                  <p className="font-serif text-midnight" style={{ fontSize: 22 }}>
                    Thanks — we'll be in touch.
                  </p>
                </div>
              )}
            </Reveal>
          </div>
        </div>
      );
    }
