  <style>
    html, body { background: #f5f2ec; color: #0f0e0c; }
    body { font-family: "DM Sans", system-ui, sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }

    /* ---------- Privacy page body ---------- */
    .privacy-body { max-width: 680px; margin: 0 auto; }
    .privacy-body h2 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-weight: 400;

    .privacy-body p + p { margin-top: 16px; }

      color: #8a6e3e;

    .privacy-section { padding: 56px 0; border-top: 1px solid #d8d2c8; }
    .privacy-section:first-of-type { border-top: 0; padding-top: 0; }

    /* ---------- Local hero (parchment, no image) ---------- */

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react" src="assets/site-chrome.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    /* Local parchment hero — shares the PageHero layout rhythm (tagline,
       title, thesis) but renders on parchment with dark text. The shared
       PageHero is designed for dark photographic backgrounds, so for a
       text-only page like Privacy we swap in this lighter variant rather
       than fight the component's styling. */
    function PrivacyHero() {
      return (
        <header className="p-hero">
          <div className="hero-inner">
            <div className="tag">Privacy</div>
            <h1>How we handle your data.</h1>
            <p className="thesis">
              Short version — we collect as little as possible, use it only for what we said we'd use it for, and delete it if you ask.
            </p>
          </div>
        </header>
      );
    }

    function App() {
      return (
        <>
          <SiteNav current="privacy.html" overHero={false} />
          <PrivacyHero />

          <section>
            <div className="px-6 md:px-12 py-20 md:py-28">
              <div className="privacy-body">

                <div className="privacy-section">
                  <span className="privacy-num">01</span>
                  <h2>What we collect</h2>
                  <p>
                    When you join the waitlist, we collect your email address and the role you indicated — member, founder, teacher, or venue. When you refer someone, we collect the name or email you enter.
                  </p>
                  <p>
                    When you visit this site, we collect basic analytics — page views, referring site, rough location by city — using a privacy-respecting analytics tool that does not use cookies or track you across sites. We do not use Google Analytics. We do not sell data. We do not share it with advertisers.
                  </p>
                </div>

                <div className="privacy-section">
                  <span className="privacy-num">02</span>
                  <h2>Why we collect it</h2>
                  <p>
                    We collect your email so we can tell you when Gather launches in your city, and so we can invite you to early beta if you're a fit. We collect your role so we can send you the right invitation — a founder's email looks different from a member's email. That's it.
                  </p>
                </div>

                <div className="privacy-section">
                  <span className="privacy-num">03</span>
                  <h2>How long we keep it</h2>
                  <p>
                    Until Gather launches in your city, plus a reasonable window after to onboard you. If Gather has not launched in your city within two years of your signup, we will delete your email and let you know.
                  </p>
                </div>

                <div className="privacy-section">
                  <span className="privacy-num">04</span>
                  <h2>Your rights</h2>
                  <p>
                    You can ask us to show you what data we have about you, correct anything that's wrong, or delete it entirely — at any time, for any reason, no questions. Email <a href="mailto:hello@gather.place">hello@gather.place</a> and we'll handle it within 30 days.
                  </p>
                  <p>
                    Under PIPEDA and Alberta's PIPA, you also have the right to file a complaint with the Privacy Commissioner of Canada or the Alberta Office of the Information and Privacy Commissioner.
                  </p>
                </div>

                <div className="privacy-section">
                  <span className="privacy-num">05</span>
                  <h2>Who we share with</h2>
                  <p>
                    Our email storage runs on Supabase, hosted in North America. We send transactional email through a reputable provider. We do not share your data with any other third parties.
                  </p>
                </div>

                <div className="privacy-section">
                  <span className="privacy-num">06</span>
                  <h2>Cookies</h2>
                  <p>
                    This site does not use cookies for tracking, advertising, or any non-essential purpose. If we add functionality in the future that requires cookies, we will ask first.
                  </p>
                </div>

                <div className="privacy-section">
                  <span className="privacy-num">07</span>
                  <h2>Changes to this policy</h2>
                  <p>
                    If we change how we handle data, we'll update this page and the date below. If the changes affect people already on the waitlist, we'll email you.
                  </p>
                </div>

                <div style={{borderTop: '1px solid #d8d2c8', marginTop: 56, paddingTop: 32}}>
                  <p style={{fontFamily:'"DM Sans", sans-serif', fontSize: 13, lineHeight: 1.6, color: '#7a7670'}}>
                    Last updated: April 21, 2026. Questions? <a href="mailto:hello@gather.place" style={{color:'#8a6e3e', borderBottom:'1px solid rgba(138,110,62,0.35)'}}>hello@gather.place</a>.
                  </p>
                </div>

              </div>
            </div>
          </section>

          <SiteFooter />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="assets/motion.js"></script>
