  <script type="text/babel" data-presets="env,react" src="assets/site-chrome.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;
    const N = ({children}) => <span style={{fontVariantNumeric:'tabular-nums',fontWeight:500,color:'#8a6e3e'}}>{children}</span>;

    function App() {
      return (
        <>
          <SiteNav current="teachers.html" />
          <PageHero
            image="assets/teachers-yoga-class.png"
            tagline="For teachers, guides, and practitioners"
            title={<>Teach what you <em className="italic" style={{color:'#8a6e3e'}}>know</em>. To people who showed up for it.</>}
            thesis="You don't want a bigger platform. You want full rooms of the right people, a calendar that respects your craft, and nothing between you and teaching. Gather is built for you, not for the algorithm."
          />

          <SectionTransition bg="#efebe2" />
          <Benefits
            eyebrow="What Gather gives you"
            title={<>The tools of running a studio — without running a <em className="italic" style={{color:'#8a6e3e'}}>studio</em>.</>}
            items={[
              { lead: 'Verified credentials that students can see.', desc: 'We verify your certifications against registries when we can.' },
              { lead: 'A venue network at partner rates.', desc: 'Book the right room without maintaining rental relationships yourself.' },
              { lead: 'Your email list stays yours.', desc: 'You own the relationship with every student who takes a class from you.' },
              { lead: 'Series, drop-ins, memberships — your choice.', desc: 'Structure your offerings however suits your teaching.' },
              { lead: 'You keep 85%.', desc: 'A flat 15% platform fee. No subscription, no per-transaction cost.' },
              { lead: 'Liability covered.', desc: 'Classes at partner venues are covered under a shared liability umbrella.' },
            ]}
          />

          <CuratedInventory
            eyebrow="What you can teach here"
            title={<>The range of <em className="italic" style={{color:'#8a6e3e'}}>practice</em>.</>}
            intro="Whatever you teach, the structure is the same — a room, a schedule, your students."
            categories={[
              { header: 'AI & tools',             items: ['AI fundamentals','prompt engineering','Claude & GPT for professionals','vibe coding','Cursor workshops','building with LLMs'] },
              { header: 'Music production & DJ',  items: ['Ableton','Logic Pro','DJing fundamentals','sound design','mixing & mastering','beat making','turntablism'] },
              { header: 'Movement & wellness',    items: ['yoga','pilates','breathwork','running technique','mobility','meditation'] },
              { header: 'Craft & making',         items: ['pottery','painting','jewelry','woodworking','letterpress','ceramics'] },
              { header: 'Food & drink',           items: ['cooking classes','baking','wine','cocktails','tea ceremony','fermentation'] },
              { header: 'Music & performance',    items: ['piano','guitar','voice','improv','songwriting','music theory'] },
              { header: 'Thought & skill',        items: ['writing','public speaking','photography','language','philosophy','critical thinking'] },
            ]}
          />

          <section className="w-full pb-24 md:pb-32">
            <SectionHead eyebrow="How it works, in practice" title={<>The class you were meant to <em className="italic" style={{color:'#8a6e3e'}}>teach</em>.</>} />

            {/* WASH:teachers */}
            <div className="relative w-full overflow-hidden" style={{background:'#e8e2d4'}}>
              <div aria-hidden className="gather-image-break" style={{position:'absolute', inset:0, backgroundImage:'url("assets/teachers-keyboard-lesson.png")', backgroundSize:'cover', backgroundPosition:'center', opacity:0.18, pointerEvents:'none', zIndex:0, transform:'scale(1.08)', transition:'transform 1200ms ease-out'}} />
              <div style={{position:'relative', zIndex:1}}>
                <CharacterPullout name="Meet Maya." photo="assets/maya.png" photoAlt="Maya, Calgary yoga teacher">
              <p className="dropcap">Maya is 36, has been teaching yoga in Calgary for eleven years, and is the instructor people ask for by name at two of the city's better-known boutique studios. She teaches four classes a week on someone else's schedule, at someone else's rate, in someone else's room.</p>
              <p>She's good. She has a following. After a decade of it, she's also quietly exhausted by the arithmetic of the business she works inside. The studios pay her <N>$45 a class</N>. A full room of 20 students at <N>$28</N> a drop-in generates <N>$560</N> in revenue. Maya sees about <N>8%</N> of it. The rest goes to rent, front desk, software, retail, marketing, and the studio's margin — all of which she understands, and none of which she wants to keep subsidising for the rest of her career.</p>
              <p>She's thought about opening her own studio. She's run the numbers more than once. A small Calgary space — <N>1,200 square feet</N>, decent neighbourhood, basic build-out — runs <N>$4,500 to $6,000</N> a month before utilities. To break even she'd need to fill <N>90 class-spots a week</N>, every week, from day one. The runway is too long. The commitment is too total. The risk, for a solo practitioner with two kids and a mortgage, is too real.</p>
              <p>What she actually wants is in between. Three or four classes a month. Her own students, her own style, her own rate. A space that's nicer than a community hall, for an evening at a time, without signing a lease.</p>
            </CharacterPullout>
              </div>
            </div>

            <SectionTransition bg="#f5f2ec" />

            <Beat pullQuote="She has sent three text messages to friends telling them she finally did it." first eyebrow="Day One" title={<>She <em className="italic" style={{color:'#8a6e3e'}}>launches</em> in an afternoon.</>}>
              <p>Maya signs up at gather.place on a Sunday afternoon. She tells the AI launch engine: slow flow and restorative, for women in their 30s and 40s who've practiced for a while and want something quieter than the heated class at a big studio. Monthly cadence, starting. Small rooms. Calgary inner city.</p>
              <p>An hour later she has a name (<em>Slow Practice Calgary</em>), a logo, and a landing page. A class structure — <N>75-minute</N> evening sessions, <N>$32</N> per spot, capped at <N>14 students</N> per class, two classes per month to start. Ad copy targeted to Calgary women aged 30–50 who follow yoga, wellness, and mindfulness content.</p>
              <p>A matched venue — a loft space in Bridgeland with good wood floors, soft light, and a small sound system, available on Monday evenings. A mailing list tool with pre-written email templates she can send to her existing student contacts.</p>
              <p>She runs <N>$150</N> in ads that first week and emails her list of former students. By the following weekend both classes are full, and a waitlist of <N>nine</N> has started forming.</p>
            </Beat>

            <Beat pullQuote="It's additive income." eyebrow="Month Three" title={<>A real <em className="italic" style={{color:'#8a6e3e'}}>practice</em> takes shape.</>}>
              <p>Three months in. Maya has run six classes. The room has filled every time. Her waitlist has grown to the point that she's added a third monthly class — same venue, Sunday mornings — and quietly raised the price to <N>$36</N>.</p>
              <p>Her numbers: three classes per month, averaging <N>13 students</N> per class, <N>$36</N> per spot. Monthly gross revenue around <N>$1,400</N>. After the 15% platform fee, the venue cost, and a small monthly mat-rental expense, she's clearing around <N>$750 a month</N> — on roughly six hours of actual teaching time and maybe two hours a month of organization.</p>
              <p>That's not replacement income. It's additive income — money on top of her boutique-studio classes, for work she fully controls. More importantly: the students are hers. The mailing list is hers. The brand is hers. If a studio closes or changes its schedule, none of that touches Slow Practice Calgary.</p>
            </Beat>

            <Beat pullQuote="She built a practice. That's what she always wanted." eyebrow="Year One" title={<>She's running her <em className="italic" style={{color:'#8a6e3e'}}>own</em> thing.</>}>
              <p>Twelve months in, Maya is teaching <N>four</N> Slow Practice classes per month at two different venues — the Bridgeland loft and a second space in Mission she added after six months.</p>
              <p>Annual revenue through Gather: about <N>$22,000</N>, net of platform fees and venue costs. She still teaches two classes a week at her original boutique studio, but she's planning to drop one in the spring to add a second weekly Slow Practice slot. The transition from employee of a studio to independent teacher with her own audience has happened gradually, without a single big risky leap.</p>
              <p>She did not sign a lease. She did not hire a front desk. She did not spend <N>$80,000</N> building out a studio. What she did was rent rooms by the evening, teach the classes she actually wanted to teach, and build a direct relationship with her students.</p>
              <p>She built a practice. That's what she always wanted.</p>
            </Beat>
          </section>

          <SectionTransition bg="#0f0e0c" />

          <StatementBanner text={<>Teach the class. Keep the students. Own the <em className="italic" style={{color:'#8a6e3e'}}>practice</em>.</>} />

          <SectionTransition bg="#f5f2ec" />

          <FAQ
            eyebrow="Teacher questions"
            title={<>What you'd want to <em className="italic" style={{color:'#8a6e3e'}}>know</em>.</>}
            items={[
              { q: 'What disciplines are you set up for?', a: "Yoga, meditation, movement, dance, martial arts, cooking, writing, visual art, music, and a long tail of niche practices. If you're certified to teach it and there's a venue in the network that fits, you can run it." },
              { q: 'Do I have to be certified?', a: 'It depends on the discipline. For regulated practices we verify certifications. For unregulated practices we display your self-described experience and let your students\' reviews do the rest.' },
              { q: "What's the fee structure?", a: 'We take 15% of what students pay. You pay for your own venue and materials. No subscription, no setup fee.' },
              { q: 'Can I bring my existing students onto Gather?', a: "Yes — and you should. Import your email list and invite them directly." },
              { q: 'What about private or corporate sessions?', a: 'You can run invitation-only sessions, corporate bookings, and one-on-ones through Gather.' },
              { q: 'Do I compete with a studio algorithm?', a: "No. Students find you through search, interest lists, and word of mouth." },
              { q: 'Can I run through Gather and my own studio?', a: "That's fine. Many of our teachers do." },
            ]}
          />

          <SectionTransition bg="#0f0e0c" />

          <PageCTA
            headline="Teach the class you actually want to teach."
            prompt="Create a teacher profile. Fill your first room."
            buttonLabel="Apply to teach"
            role="teacher"
          />

          <SectionDivider />

          <SiteFooter pageNumber="04" />
        </>
      );
    }

  </script>
