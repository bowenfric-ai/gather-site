<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="env,react" src="assets/site-chrome.jsx"></script>
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;
    const N = ({children}) => <span style={{fontVariantNumeric:'tabular-nums',fontWeight:500,color:'#8a6e3e'}}>{children}</span>;

    function App() {
      return (
        <>
          <SiteNav current="members.html" />
          <PageHero
            image="assets/members-boxing-class.png"
            tagline="For members"
            title={<>Join something <em className="italic" style={{color:'#8a6e3e'}}>real</em>.</>}
            thesis="You want more of your life to happen in rooms, not feeds. Gather is one place to find your people in your city — and signal interest in the communities that don't exist yet."
          />

          <SectionTransition bg="#efebe2" />
          <Benefits
            eyebrow="What we do for members"
            title={<>Everything you need to find your <em className="italic" style={{color:'#8a6e3e'}}>people</em>.</>}
            items={[
              { lead: 'One place to find real communities and classes near you.', desc: 'Browse by interest, neighbourhood, and schedule.' },
              { lead: 'Join, book, and pay for everything in one spot.', desc: 'One account, one payment method, one calendar view.' },
              { lead: 'Everything handled automatically.', desc: 'Calendar invites, reminders, receipts, waitlists. You never have to track a thing.' },
              { lead: "Signal interest in what doesn't exist yet.", desc: "Add yourself to the interest list for the community you wish was in your city." },
              { lead: 'Discover new groups early.', desc: 'Be in the founding cohort — not the waitlist two years in.' },
            ]}
          />

          <CuratedInventory
            eyebrow="What you can find here"
            title={<>A sense of what's <em className="italic" style={{color:'#8a6e3e'}}>possible</em>.</>}
            intro="Every week, people in your city are hosting something. Here's a sense of the range."
            categories={[
              { header: 'Building & AI',        items: ['AI Practitioners Circle','AI Tools Club','Prompt Engineering Nights','Builder Breakfast','Vibe Coding Saturdays','Claude & GPT for Professionals'] },
              { header: 'Music & sound',        items: ['Music Production Club','DJ Practice Nights','Ableton Circle','Beatmakers Meetup','Sound Design Workshop','Vinyl Listening Sessions'] },
              { header: 'Dinner & table',       items: ['Sunday Dinner Club','First Friday Suppers','Ramen Tuesdays','Long Table Potluck','Wine Club'] },
              { header: 'Movement',             items: ['Saturday Morning Run Club','Rooftop Yoga','Pickleball League','Dance Nights','Winter Hiking Group'] },
              { header: 'Making',               items: ['Paint Night','Pottery Sundays','Watercolor Club','Fiction Writers Group','Piano Lessons','Woodshop'] },
              { header: 'Mind & conversation',  items: ['Book Club','French Conversation','Chess Club','Philosophy Salon','Meditation Mornings','Film Society'] },
              { header: 'Work & craft',         items: ['Entrepreneurs Circle','Founders Breakfast','Product Design Meetup','Indie Hackers','Creative Directors Circle'] },
            ]}
          />

          <section className="w-full pb-24 md:pb-32">
            <SectionHead eyebrow="How it works, in practice" title={<>Finding a <em className="italic" style={{color:'#8a6e3e'}}>rhythm</em> in a new city.</>} />

            {/* WASH:members */}
            <div className="relative w-full overflow-hidden" style={{background:'#e8e2d4'}}>
              <div aria-hidden className="gather-image-break" style={{position:'absolute', inset:0, backgroundImage:'url("assets/members-dinner-table.png")', backgroundSize:'cover', backgroundPosition:'center', opacity:0.18, pointerEvents:'none', zIndex:0, transform:'scale(1.08)', transition:'transform 1200ms ease-out'}} />
              <div style={{position:'relative', zIndex:1}}>
                <CharacterPullout name="Priya" photo="assets/priya.png" photoAlt="Priya, new to Calgary">
              <p className="dropcap">Priya is 29, a product designer, and six weeks into a new life in Calgary. She moved from Toronto for a job she's excited about, into a one-bedroom in Kensington she's quietly proud of. The move was the right call. She's sure of that. She's less sure what to do with her Saturdays.</p>
              <p>In Toronto she had a life. A standing Wednesday dinner with four friends from design school. A book club that met at the same wine bar for three years. A weekend ritual of walking the Danforth with her sister. None of that transferred. Her Wednesday group has a new chair. The book club is reading without her.</p>
              <p>She tried the obvious things — downloaded Meetup and closed it ten minutes later, joined two Calgary subreddits that were mostly complaints about traffic, went to one yoga class and went home to an empty apartment feeling exactly as alone as before. She has a coworker who keeps inviting her to drinks with the same five people, and while they're kind, they're not hers. She's not lonely, exactly. She's unrooted.</p>
            </CharacterPullout>
              </div>
            </div>

            <SectionTransition bg="#f5f2ec" />

            <Beat pullQuote="They exchange numbers, because that's how it starts." first eyebrow="Day One" title={<>She finds her way <em className="italic" style={{color:'#8a6e3e'}}>in</em>.</>}>
              <p>Priya signs up at gather.place on a Thursday night. The onboarding asks her a few questions: what neighbourhood, what interests, what times work.</p>
              <p>Fifteen minutes of browsing later, she has three tabs open: <em>Slow Practice Calgary</em> (Monday-evening restorative yoga in Bridgeland), <em>Pages & Pinot</em> (a monthly book club at a wine bar in Mission), and <em>Weekend Ramblers</em> (Saturday walking group rotating along the Bow). She signs up for all three. The total cost is <N>$68 for the month</N>.</p>
              <p>She also adds herself to two interest lists — communities that don't exist yet but that she'd join if they did. South Asian women in Calgary tech (<N>17 interested</N>). Singles dinner club for 30-somethings who aren't trying to date, just eat with strangers (<N>42 interested</N>). The platform promises to notify her if either gets built.</p>
              <p>That Monday she goes to yoga. She doesn't know anyone. After class she ends up in a short conversation with the woman who had the mat next to her. They exchange numbers, because that's how it starts.</p>
            </Beat>

            <Beat pullQuote="Her text threads have Calgary names in them." eyebrow="Month Three" title={<>The rhythm is <em className="italic" style={{color:'#8a6e3e'}}>back</em>.</>}>
              <p>Three months in, Priya has a schedule. Not a packed one — that was never the goal — but a rhythm. Yoga on Mondays. Book club second Tuesday. Walking group alternating Saturdays.</p>
              <p>More importantly, she knows people now. The woman from yoga became a regular coffee. Two people from the walking group turned into a Friday evening hike-and-pizza thing. One of the interest lists she joined — the South Asian women in tech community — hit <N>28 signups</N>, and a Calgary founder launched it with Priya in the first cohort.</p>
              <p>She hasn't thought about Meetup since her first week.</p>
            </Beat>

            <Beat pullQuote="Calgary is home." eyebrow="Year One" title={<>Calgary is <em className="italic" style={{color:'#8a6e3e'}}>home</em>.</>}>
              <p>Twelve months in, Priya's life looks nothing like it did in month one, and not because anything dramatic happened. She just kept showing up. She has a core of <N>twelve people</N> she considers real friends, most of whom she met through two or three communities she stayed with. She knows the baristas at her coffee shop, the regulars at the walking group who'd notice if she stopped showing up.</p>
              <p>She did not have to be brave. What she did was find rooms that were already forming, show up consistently, and let time do what time does when you put it in the right rooms.</p>
            </Beat>
          </section>

          <SectionTransition bg="#0f0e0c" />

          <StatementBanner text={<>You don't find your people. You show up where they're <em className="italic" style={{color:'#8a6e3e'}}>forming</em>.</>} />

          <SectionTransition bg="#f5f2ec" />

          <FAQ
            eyebrow="Frequently asked"
            title={<>Common questions from <em className="italic" style={{color:'#8a6e3e'}}>members</em>.</>}
            items={[
              { q: 'Do I have to pay a membership fee to Gather?', a: 'Gather itself is free to join and browse. You only pay for the communities and classes you actually join.' },
              { q: 'How do I know if a community is any good?', a: "Every community has a detailed page — what it is, who's running it, what past sessions have looked like, and how current members describe it. Most offer a single drop-in option before committing." },
              { q: "What if I try something and it's not for me?", a: 'Most communities let you cancel anytime with no penalty.' },
              { q: 'Is this for a specific age group?', a: "No. It's built for anyone who wants more of their life to happen in rooms rather than feeds." },
              { q: "What if the community I want doesn't exist yet?", a: 'Add yourself to the interest list. When enough people signal interest, we reach out to potential founders who could build it.' },
              { q: 'What cities are you in?', a: 'Calgary first. Edmonton, Vancouver, and Toronto are next.' },
            ]}
          />

          <SectionTransition bg="#0f0e0c" />

          <PageCTA
            headline="Ready to find your people?"
            prompt="Be first when Gather opens in your city — as a member."
            buttonLabel="Join the waitlist — Member"
            role="member"
          />

          <SectionDivider />

          <SiteFooter pageNumber="02" />
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="assets/motion.js"></script>
